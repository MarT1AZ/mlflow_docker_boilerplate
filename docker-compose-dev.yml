version: "1.0"
services:
  mlflow-server-con:
    build: ./mlflow-server
    ports:
      - 5000:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mlops
    volumes:
      - ./mlflow-server/ml-log:/ml-log

  ml-trainer-con:
    build: 
      context: ./ml-trainer
      dockerfile: dockerfile.dev
    networks:
      - mlops
    volumes:
      - ./ml-trainer/ml-utils:/mlops
    depends_on:
      - mlflow-server-con
    tty : true
    entrypoint: ["/bin/sh"]

networks:
  mlops:
    driver: bridge